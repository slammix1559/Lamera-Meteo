name: Meteo Lamera — Notifiche Push

on:
  schedule:
    # Ogni sera alle 20:30 ora italiana (18:30 UTC in estate, 19:30 in inverno)
    # Usiamo 18:30 UTC che corrisponde alle 20:30 CEST (estate)
    - cron: '30 18 * * *'
    # Controllo eventi estremi ogni ora dalle 6 alle 22
    - cron: '0 5-20 * * *'
  workflow_dispatch:   # permette esecuzione manuale dalla console GitHub

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Run notification script
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          VAPID_KEY: ${{ secrets.VAPID_KEY }}
          RUN_HOUR_UTC: ${{ github.event.schedule }}
        run: |
          cd scripts
          node notify.js
